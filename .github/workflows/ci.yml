# File: .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Syntax Validation (fast, always runs first) ──────────────────────────
  syntax:
    name: Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check all Python files compile
        run: |
          find src tests migrations scripts -name "*.py" \
            | xargs python -m py_compile \
            && echo "All files OK"

  # ── 2. Lint (errors only — no style enforcement) ────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      # Only check for real bugs (E=pycodestyle errors, F=pyflakes undefined/unused)
      # Skip style/opinionated rules that require reformatting the whole codebase
      - name: Ruff lint (errors only)
        run: ruff check src/ tests/ --select E,F --ignore E501,E402,F401,F811

  # ── 3. Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install greenlet

      # Create a minimal .env that satisfies pydantic-settings
      # All keys are placeholder strings — no real API calls are made in unit tests
      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          LLM_PROVIDER=anthropic
          LLM_MODEL=
          LLM_FALLBACK_PROVIDERS=
          ANTHROPIC_API_KEY=test-key-ci
          OPENAI_API_KEY=test-key-ci
          GROQ_API_KEY=test-key-ci
          OPENROUTER_API_KEY=test-key-ci
          GEMINI_API_KEY=test-key-ci
          MISTRAL_API_KEY=test-key-ci
          TOGETHER_API_KEY=test-key-ci
          OLLAMA_BASE_URL=http://localhost:11434
          CRYPTOCOM_API_KEY=
          CRYPTOCOM_API_SECRET=
          CRYPTOCOM_SANDBOX=true
          BINANCE_API_KEY=
          BINANCE_API_SECRET=
          BINANCE_TESTNET=true
          TRADING_MODE=paper
          SYMBOLS=BTC_USDT,ETH_USDT
          SCAN_INTERVAL_SECONDS=30
          BASE_CURRENCY=USDT
          INITIAL_CAPITAL=10000
          MAX_POSITION_SIZE_PCT=5.0
          STOP_LOSS_PCT=2.0
          TAKE_PROFIT_PCT=4.0
          MAX_DAILY_LOSS_PCT=5.0
          MAX_DRAWDOWN_PCT=15.0
          MAX_OPEN_POSITIONS=5
          DATABASE_URL=sqlite:///./test_trading.db
          API_HOST=0.0.0.0
          API_PORT=8000
          SECRET_KEY=ci-test-secret
          LOG_LEVEL=WARNING
          TELEGRAM_BOT_TOKEN=
          TELEGRAM_CHAT_ID=
          EOF

      # Run only the pure-logic unit tests that need no live API calls
      # Tests that require live exchange/LLM connections are tagged separately
      - name: Run unit tests (pure logic, no API calls)
        run: |
          pytest tests/unit/test_indicators.py \
                 tests/unit/test_risk_engine.py \
                 tests/unit/test_portfolio_agent.py \
                 tests/unit/test_paper_engine.py \
                 tests/unit/test_backtest_engine.py \
                 -v --tb=short

      - name: Run LLM provider tests
        run: |
          pytest tests/unit/test_llm_providers.py -v --tb=short

      - name: Clean up test database
        if: always()
        run: rm -f test_trading.db
