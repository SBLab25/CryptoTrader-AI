# File: docker/docker-compose.yml
# Docker Compose — starts backend + frontend + Redis in one command
# Usage: cd docker && docker-compose up --build -d

version: "3.9"

services:

  # ── Trading Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cryptotrader-backend
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
      - trading_data:/app/data
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=sqlite:////app/data/trading.db
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - trader-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Dashboard (serve static HTML) ───────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: cryptotrader-dashboard
    ports:
      - "3000:80"
    volumes:
      - ../dashboard:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - trader-net

  # ── Redis (caching / rate-limiting) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cryptotrader-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - trader-net

volumes:
  trading_data:

networks:
  trader-net:
    driver: bridge
